name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Changesets release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Coding-agent conformance gate (release)
        env:
          CODING_AGENT_CONFORMANCE_PROVIDERS: ${{ vars.CODING_AGENT_CONFORMANCE_PROVIDERS }}
          CODING_AGENT_CONFORMANCE_SECRETS_FILE: ${{ vars.CODING_AGENT_CONFORMANCE_SECRETS_FILE }}
          CODING_AGENT_CONFORMANCE_OUT_DIR: artifacts/coding-agent-conformance
        run: node scripts/check-coding-agent-conformance-gate.mjs
      - name: Upload conformance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coding-agent-conformance
          path: artifacts/coding-agent-conformance
      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
