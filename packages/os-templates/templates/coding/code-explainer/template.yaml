{
  "schemaVersion": 1,
  "workspace": {
    "schemaVersion": 1,
    "id": "code-explainer-workspace",
    "name": "Code Explainer Workspace",
    "tags": [
      "coding"
    ],
    "limits": {
      "usdPerRun": 2,
      "tokensPerRun": 100000
    }
  },
  "vault": {
    "backend": "env",
    "prefix": "AGENTSKITOS_"
  },
  "security": {},
  "observability": {
    "enabled": true,
    "exporters": [
      "console"
    ],
    "redactInputs": false
  },
  "agents": [
    {
      "id": "code-explainer-lead",
      "name": "Code Explainer Lead",
      "systemPrompt": "Explains unfamiliar code paths with a concise narrative and file-level risk notes. Lead the workflow and produce the first structured output.",
      "model": {
        "provider": "openai",
        "model": "gpt-5.4-mini",
        "temperature": 0.2
      },
      "tools": [
        "github.pr.read",
        "github.pr.comment",
        "repo.search"
      ],
      "tags": [
        "lead"
      ]
    },
    {
      "id": "code-explainer-reviewer",
      "name": "Code Explainer Reviewer",
      "systemPrompt": "Explains unfamiliar code paths with a concise narrative and file-level risk notes. Review the lead output for quality and policy fit.",
      "model": {
        "provider": "openai",
        "model": "gpt-5.4-mini",
        "temperature": 0.2
      },
      "tools": [
        "github.pr.read",
        "github.pr.comment",
        "repo.search"
      ],
      "tags": [
        "reviewer"
      ]
    },
    {
      "id": "code-explainer-judge",
      "name": "Code Explainer Judge",
      "systemPrompt": "Explains unfamiliar code paths with a concise narrative and file-level risk notes. Resolve disagreements and produce the final recommendation.",
      "model": {
        "provider": "openai",
        "model": "gpt-5.4-mini",
        "temperature": 0.2
      },
      "tools": [
        "github.pr.read",
        "github.pr.comment",
        "repo.search"
      ],
      "tags": [
        "judge"
      ]
    }
  ],
  "flows": [
    {
      "id": "code-explainer-flow",
      "name": "Code Explainer Flow",
      "entry": "ingest",
      "nodes": [
        {
          "id": "ingest",
          "kind": "tool",
          "tool": "github.pr.read"
        },
        {
          "id": "draft",
          "kind": "agent",
          "agent": "code-explainer-lead"
        },
        {
          "id": "review",
          "kind": "agent",
          "agent": "code-explainer-reviewer"
        },
        {
          "id": "publish",
          "kind": "tool",
          "tool": "repo.search"
        }
      ],
      "edges": [
        {
          "from": "ingest",
          "to": "draft"
        },
        {
          "from": "draft",
          "to": "review"
        },
        {
          "from": "review",
          "to": "publish"
        }
      ],
      "tags": [
        "coding"
      ]
    }
  ],
  "triggers": [
    {
      "id": "code-explainer-trigger",
      "name": "Code Explainer Trigger",
      "flow": "code-explainer-flow",
      "enabled": true,
      "tags": [
        "coding"
      ],
      "limits": {
        "usdPerRun": 2,
        "tokensPerRun": 100000
      },
      "kind": "github",
      "repo": "example/repo",
      "event": "pull_request"
    }
  ]
}
