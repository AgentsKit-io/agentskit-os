{
  "schemaVersion": 1,
  "workspace": {
    "schemaVersion": 1,
    "id": "ap-router-workspace",
    "name": "AP Router Workspace",
    "tags": [
      "finance"
    ],
    "limits": {
      "usdPerRun": 2,
      "tokensPerRun": 100000
    }
  },
  "vault": {
    "backend": "env",
    "prefix": "AGENTSKITOS_"
  },
  "security": {},
  "observability": {
    "enabled": true,
    "exporters": [
      "console"
    ],
    "redactInputs": false
  },
  "agents": [
    {
      "id": "ap-router-lead",
      "name": "AP Router Lead",
      "systemPrompt": "Routes accounts-payable requests by vendor, amount, and policy exceptions. Lead the workflow and produce the first structured output.",
      "model": {
        "provider": "openai",
        "model": "gpt-5.4-mini",
        "temperature": 0.2
      },
      "tools": [
        "invoice.read",
        "erp.lookup",
        "approval.request"
      ],
      "tags": [
        "lead"
      ]
    },
    {
      "id": "ap-router-reviewer",
      "name": "AP Router Reviewer",
      "systemPrompt": "Routes accounts-payable requests by vendor, amount, and policy exceptions. Review the lead output for quality and policy fit.",
      "model": {
        "provider": "openai",
        "model": "gpt-5.4-mini",
        "temperature": 0.2
      },
      "tools": [
        "invoice.read",
        "erp.lookup",
        "approval.request"
      ],
      "tags": [
        "reviewer"
      ]
    },
    {
      "id": "ap-router-judge",
      "name": "AP Router Judge",
      "systemPrompt": "Routes accounts-payable requests by vendor, amount, and policy exceptions. Resolve disagreements and produce the final recommendation.",
      "model": {
        "provider": "openai",
        "model": "gpt-5.4-mini",
        "temperature": 0.2
      },
      "tools": [
        "invoice.read",
        "erp.lookup",
        "approval.request"
      ],
      "tags": [
        "judge"
      ]
    }
  ],
  "flows": [
    {
      "id": "ap-router-flow",
      "name": "AP Router Flow",
      "entry": "ingest",
      "nodes": [
        {
          "id": "ingest",
          "kind": "tool",
          "tool": "invoice.read"
        },
        {
          "id": "draft",
          "kind": "agent",
          "agent": "ap-router-lead"
        },
        {
          "id": "review",
          "kind": "agent",
          "agent": "ap-router-reviewer"
        },
        {
          "id": "approval",
          "kind": "human",
          "prompt": "Approve AP Router before external action?",
          "approvers": [
            "owner"
          ],
          "quorum": 1
        },
        {
          "id": "publish",
          "kind": "tool",
          "tool": "approval.request"
        }
      ],
      "edges": [
        {
          "from": "ingest",
          "to": "draft"
        },
        {
          "from": "draft",
          "to": "review"
        },
        {
          "from": "review",
          "to": "approval"
        },
        {
          "from": "approval",
          "to": "publish"
        }
      ],
      "tags": [
        "finance"
      ]
    }
  ],
  "triggers": [
    {
      "id": "ap-router-trigger",
      "name": "AP Router Trigger",
      "flow": "ap-router-flow",
      "enabled": true,
      "tags": [
        "finance"
      ],
      "limits": {
        "usdPerRun": 2,
        "tokensPerRun": 100000
      },
      "kind": "email",
      "mailbox": "inbox@example.com",
      "filter": "subject:ap-router"
    }
  ]
}
