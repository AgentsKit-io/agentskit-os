name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changeset-lint:
    name: Changeset lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check for changeset
        env:
          PR_BRANCH: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Skip release version PRs — they consume changesets, never add new ones.
          case "$PR_BRANCH" in
            chore/release-*)
              echo "Release branch ($PR_BRANCH) — skipping changeset check."
              exit 0
              ;;
          esac
          case "$PR_TITLE" in
            'chore(release)'*)
              echo "Release title ($PR_TITLE) — skipping changeset check."
              exit 0
              ;;
          esac

          CHANGED=$(git diff --name-only origin/main...HEAD)
          NEEDS_CHANGESET=$(echo "$CHANGED" | grep -E '^packages/' || true)
          if [ -z "$NEEDS_CHANGESET" ]; then
            echo "No changes inside packages/ — changeset not required."
            exit 0
          fi
          echo "Package changes detected. Verifying changeset exists..."
          pnpm changeset status --since=origin/main

  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "./packages/*" build
      - run: pnpm --filter "./packages/*" lint
      - run: pnpm test

  desktop-web:
    name: Desktop web bundle (no Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "./packages/*" build
      - run: pnpm --filter @agentskit/desktop build:web

  adr:
    name: ADR enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node scripts/check-no-agentskit-deps.mjs
      - run: node scripts/check-zod-is-peer.mjs
      - run: node scripts/check-distribution.mjs
